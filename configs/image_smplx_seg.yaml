### Input
# input rgba image path (default to None, can be load in GUI too)
input: 
input_back: 
input_left: 
input_right: 
# input text prompt (default to None, can be input in GUI too)
prompt: high quality, caucasian man, black and white striped jacket, black pants, black hair, black shoes
negative_prompt:
# input mesh for stage 2 (auto-search from stage 1 output path if None)
mesh:
# estimated elevation angle for input image 
elevation: 0
# reference image resolution
ref_size: 1024
# density thresh for mesh extraction
density_thresh: 1

### Output
outdir: logs
mesh_format: obj
save_path: ???

### Training
# use mvdream instead of sd 2.1
mvdream: False
# use imagedream
imagedream: False
# use stable-zero123 instead of zero123-xl
stable_zero123: False 
# guidance loss weights (0 to disable)
lambda_sd: 0 # 1
lambda_zero123: 1 # 1 # 0 #  1
# warmup rgb supervision for image-to-3d
warmup_rgb_loss: True
# training batch size per iter
batch_size: 4
# training iterations for stage 1
iters: 500
# whether to linearly anneal timestep
anneal_timestep: True
# training iterations for stage 2
iters_refine: 50
# training camera radius
radius: 1.5
# training camera fovy
fovy: 49.1 # align with zero123 rendering setting (ref: https://github.com/cvlab-columbia/zero123/blob/main/objaverse-rendering/scripts/blender_script.py#L61
# training camera min elevation
min_ver: -30
# training camera max elevation
max_ver: 30
# checkpoint to load for stage 1 (should be a ply file)
load:
# whether allow geom training in stage 2
train_geo: False
# prob to invert background color during training (0 = always black, 1 = always white)
invert_bg_prob: 0.5


### GUI
gui: False
force_cuda_rast: False
# GUI resolution
H: 800
W: 800

### Gaussian splatting
num_pts: 100000
sh_degree: 0
position_lr_init: 0 # 0.001
position_lr_final: 0 # 0.00002
position_lr_delay_mult: 0.02
position_lr_max_steps: 500
feature_lr: 0.01
opacity_lr: 0.05 # 0.05 # 0 # 0.05
scaling_lr: 0.005 # 0 # 0.005 # 0 # 0.005
rotation_lr: 0.005
percent_dense: 0.1
density_start_iter: 10 # 100
density_end_iter: 3000
densification_interval: 100
opacity_reset_interval: 700
densify_grad_threshold: 0.5

### Textured Mesh
geom_lr: 0.0001
texture_lr: 0.2
render_learnable: False

load_mesh: 'logs/output/animateanyone/demo12_000_rgba_ds.obj'
force_points_outside: True
use_normal: False
input_zoom: False
anisotropy_regularizer: True

seg_lr: 0 # 0.01

force_nonskin_category: False
use_seg: True

# smplx_gaussians: logs/output/eva_colored/demo12_colored_smplx_model.ply
smplx_gaussians: logs/output/eva_colored/demo12_000_rgbalgm_smplx_model.ply
# smplx_gaussians: logs/output/eva_colored/demo12_000_rgbalgm_clothed_smplx_model.ply
enable_mv: False

lgm_init: True
lgm_ply: /home/pangyyyyy/Documents/Public/github/cvpr/dreamgaussian4d/logs/demo12_000_rgba_seg_model.ply
# lgm_ply: /home/pangyyyyy/Documents/Research/Tryouts/clothed_humans/LGM/workspace/animateanyone_demo12_000.ply
# lgm_ply: /home/pangyyyyy/Documents/Public/github/cvpr/clone/dreamgaussian/logs/demo12_000_rgba_seg_model.ply


use_refine: True
refine_ply: null